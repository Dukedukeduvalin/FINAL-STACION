name: Compilar VST3 (Windows)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Descargar el codigo del proyecto
        uses: actions/checkout@v4

      - name: Crear directorio libs
        run: mkdir -p libs
        shell: bash

      - name: Descargar JUCE 8.0.6
        run: git clone --depth 1 --branch 8.0.6 https://github.com/juce-framework/JUCE.git libs/JUCE

      - name: Configurar con CMake (Visual Studio 2026)
        run: cmake -B build -S . -G "Visual Studio 18 2026" -A x64

      - name: Compilar (Release)
        run: cmake --build build --config Release

      - name: Empaquetar el VST3 resultante
        shell: bash
        run: |
          mkdir -p artefacto
          if [ -d "build/EstacionFinal_artefacts/Release/VST3" ]; then
            cp -r "build/EstacionFinal_artefacts/Release/VST3/Estacion Final.vst3" artefacto/
          elif [ -d "build/Release/VST3" ]; then
            cp -r "build/Release/VST3/Estacion Final.vst3" artefacto/
          else
            echo "VST3 no encontrado. Estructura del build:"
            find build -name "*.vst3" || echo "No se encontró ningún .vst3"
            exit 1
          fi

      - name: Publicar el VST3
        uses: actions/upload-artifact@v4
        with:
          name: EstacionFinal-VST3-Windows
          path: artefacto/Estacion Final.vst3
          retention-days: 30
